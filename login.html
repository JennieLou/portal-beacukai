<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Web Portal Bea Cukai</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="login-page">
  <main class="login-wrap">
    <section class="login-panel">
      <div class="login-logo">
        <div class="brand-mark">BC</div>
        <div>
          <h1>Web Portal Bea Cukai</h1>
          <p>Kawasan Berikat Monitoring</p>
        </div>
      </div>
      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
            <input class="form-control" id="username" type="text" value="BC-USER-01" autocomplete="username" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
            <input class="form-control" id="password" type="password" value="password" autocomplete="current-password" required>
          </div>
        </div>
        <div class="alert alert-danger d-none" id="loginError">Username dan password wajib diisi.</div>
        <button class="btn btn-primary w-100" type="submit"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
      </form>
      <div class="login-note">Dummy access: View and Export only. SAP Business One remains the source of truth.</div>
    </section>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      document.getElementById('loginError').classList.toggle('d-none', Boolean(username && password));
      if (username && password) window.location.href = 'index.html#/home';
    });
  </script>
</body>
</html>
